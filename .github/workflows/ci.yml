name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # susurrus-audio は default off。 audio feature を有効化する job だけ
  # CMAKE_POLICY_VERSION_MINIMUM=3.5 を設定する。

jobs:
  fmt:
    runs-on: ubuntu-latest
    name: Rustfmt
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    name: Clippy
    env:
      RUSTFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            clippy-cargo-
      - name: Run clippy (workspace minus audio)
        # susurrus-audio は libopus (cmake) 依存で別 job 扱い
        run: cargo clippy --workspace --exclude susurrus-audio --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Test (${{ matrix.os }})
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-
      - name: Build workspace (audio excluded)
        run: cargo build --workspace --exclude susurrus-audio --all-targets
      - name: Run tests (audio excluded)
        run: cargo test --workspace --exclude susurrus-audio --all-targets

  audio:
    runs-on: ubuntu-latest
    name: Audio (Opus + cpal)
    # cmake が古い環境で audiopus がビルド失敗する case がある。
    # CMAKE_POLICY_VERSION_MINIMUM=3.5 で回避。
    env:
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install build deps for libopus / cpal
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev pkg-config
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: audio-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            audio-cargo-
      - name: Build & test susurrus-audio
        run: cargo test -p susurrus-audio --all-targets

  frontend:
    runs-on: ubuntu-latest
    name: Frontend (Vite build)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: susurrus-tauri/frontend/package-lock.json
      - name: npm install
        run: npm ci
        working-directory: susurrus-tauri/frontend
      - name: npm run build
        run: npm run build
        working-directory: susurrus-tauri/frontend

  smoke:
    runs-on: ubuntu-latest
    name: Single-machine smoke (HTTP API + forum CRUD)
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: smoke-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            smoke-cargo-
            ubuntu-latest-cargo-
      - name: Run single-machine smoke (forum/channel/thread/reply via HTTP + IPC equivalents)
        run: cargo test -p susurrus-tauri --test smoke_single_machine -- --nocapture

  audit:
    runs-on: ubuntu-latest
    name: Security audit
    # transitive 脆弱性は upstream 追従が必要なので情報提供のみ。
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install --locked cargo-audit
      - name: Run cargo audit
        run: cargo audit
